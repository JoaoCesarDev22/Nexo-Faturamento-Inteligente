<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo or 'Ops' }} — NEXO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/nexo.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="text-center p-4" style="max-width:460px;">
        <div style="font-size:3rem;line-height:1;" class="mb-3"><i class="bi bi-exclamation-octagon-fill text-warning"></i></div>
        <h1 class="h4 mb-2">{{ titulo or 'Algo deu errado' }}</h1>
        <p class="text-muted">{{ mensagem or 'Tente novamente em instantes.' }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-outline-light mt-2">
            <i class="bi bi-house"></i> Voltar ao início
        </a>
    </div>
</body>
</html>
